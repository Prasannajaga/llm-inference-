server {
    listen 80;
    server_name localhost;

    resolver 127.0.0.11 ipv6=off valid=10s;

    set $user_service http://user-service:8001;
    set $order_service http://order-service:8002;
    set $payment_service http://payment-service:8003;
    set $inventory_service http://inventory-service:8004;
    set $notification_service http://notification-service:8005;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = /metrics {
        proxy_pass $user_service;
    }

    location /metrics/ {
        proxy_pass $user_service;
    }

    location = /user-service {
        return 308 /user-service/;
    }

    location /user-service/ {
        rewrite ^/user-service/(.*)$ /$1 break;
        proxy_pass $user_service;
    }

    location = /order-service {
        return 308 /order-service/;
    }

    location /order-service/ {
        rewrite ^/order-service/(.*)$ /$1 break;
        proxy_pass $order_service;
    }

    location = /payment-service {
        return 308 /payment-service/;
    }

    location /payment-service/ {
        rewrite ^/payment-service/(.*)$ /$1 break;
        proxy_pass $payment_service;
    }

    location = /inventory-service {
        return 308 /inventory-service/;
    }

    location /inventory-service/ {
        rewrite ^/inventory-service/(.*)$ /$1 break;
        proxy_pass $inventory_service;
    }

    location = /notification-service {
        return 308 /notification-service/;
    }

    location /notification-service/ {
        rewrite ^/notification-service/(.*)$ /$1 break;
        proxy_pass $notification_service;
    }
}
